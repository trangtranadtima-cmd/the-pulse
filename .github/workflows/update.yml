name: "Update The Pulse"

on:
  schedule:
    - cron: "37 22 * * *"
    - cron: "37 4 * * *"
    - cron: "37 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install deps"
        run: pip install feedparser requests

      - name: "Fetch and build"
        run: python fetch_fashion.py

      - name: "Push"
        run: |
          git config user.name "pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Update the pulse" || echo "No changes"
          git push
